<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D2R Stash Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0806;--bg2:#120e0a;--bg3:#1a1410;--bg4:#221c16;
    --border:#3a2e22;--border2:#52402e;
    --gold:#c8a96e;--gold2:#e8c97e;--gold3:#f5dfa0;
    --set:#4aad52;--set-bg:#0d1f0f;--set-border:#2a5c2e;
    --unique:#c8a96e;--unique-bg:#1f160a;--unique-border:#5c3e1a;
    --sock:#4a7cad;--sock-bg:#0a0f1f;--sock-border:#1a3a5c;
    --stored:#666;--equipped:#4aad52;--seeking:#c8a96e;--complete:#a87cad;
    --complete-bg:#1a0f1f;--danger:#ad4a4a;
    --text:#d4c4a8;--text2:#8a7a64;--text3:#5a4e3e;
    --radius:4px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:16px;min-height:100vh;}

  header{border-bottom:1px solid var(--border);background:linear-gradient(180deg,#1a1008 0%,var(--bg) 100%);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;}
  .logo{font-family:'Cinzel',serif;font-size:18px;font-weight:600;color:var(--gold);letter-spacing:.08em;display:flex;align-items:center;gap:10px;}
  .logo-rune{width:28px;height:28px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--gold);opacity:.8;}
  nav{display:flex;gap:4px;}
  .nav-btn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;padding:6px 14px;background:transparent;color:var(--text2);border:0.5px solid transparent;border-radius:var(--radius);cursor:pointer;transition:all .15s;}
  .nav-btn:hover{color:var(--gold);border-color:var(--border);}
  .nav-btn.active{color:var(--gold);border-color:var(--border2);background:var(--bg3);}

  main{max-width:1100px;margin:0 auto;padding:1.5rem;}
  .page{display:none;}
  .page.active{display:block;}

  .universal-search{position:relative;margin-bottom:1.5rem;}
  .universal-search input{width:100%;font-family:'Crimson Text',serif;font-size:17px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);outline:none;transition:border-color .15s;}
  .universal-search input:focus{border-color:var(--gold);}
  .universal-search input::placeholder{color:var(--text3);font-style:italic;}
  .search-hint{font-size:12px;color:var(--text3);margin-top:6px;font-style:italic;padding-left:2px;}

  .autocomplete{position:absolute;top:100%;left:0;right:0;z-index:100;background:var(--bg3);border:1px solid var(--border2);border-top:none;border-radius:0 0 var(--radius) var(--radius);max-height:340px;overflow-y:auto;}
  .ac-section{padding:6px 12px 4px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-top:0.5px solid var(--border);margin-top:4px;}
  .ac-section:first-child{border-top:none;margin-top:0;}
  .ac-item{padding:8px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:background .1s;}
  .ac-item:hover,.ac-item.focused{background:var(--bg4);}
  .ac-item-name{font-size:14px;}
  .ac-item-name.set{color:var(--set);}
  .ac-item-name.unique{color:var(--unique);}
  .ac-item-name.socketed{color:var(--sock);}
  .ac-item-name.runeword{color:#b89050;}
  .rw-recipe{color:#b89050!important;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.03em;}
  .ac-item-sub{font-size:12px;color:var(--text3);font-style:italic;}
  .ac-item-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .ac-stash{font-size:12px;color:var(--gold);font-family:'Cinzel',serif;}
  .ac-action-btn{font-family:'Cinzel',serif;font-size:10px;padding:3px 10px;border:0.5px solid var(--border2);color:var(--text2);background:transparent;border-radius:2px;cursor:pointer;transition:all .1s;}
  .ac-action-btn:hover{border-color:var(--gold);color:var(--gold);}
  .ac-action-btn.add{border-color:var(--set-border);color:var(--set);background:var(--set-bg);}
  .ac-new{padding:10px 14px;display:flex;align-items:center;gap:10px;border-top:0.5px solid var(--border);cursor:pointer;transition:background .1s;}
  .ac-new:hover{background:var(--bg4);}
  .ac-new-label{font-size:14px;color:var(--text2);font-style:italic;}
  .ac-new-tag{font-family:'Cinzel',serif;font-size:10px;padding:3px 10px;border:0.5px solid var(--border2);color:var(--text2);border-radius:2px;}

  .stats-bar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem;}
  .stat-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px 16px;}
  .stat-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.08em;color:var(--text3);margin-bottom:4px;text-transform:uppercase;}
  .stat-val{font-size:22px;color:var(--gold2);font-weight:600;}

  .filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
  input[type="text"],select{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Crimson Text',serif;font-size:15px;padding:7px 12px;height:36px;outline:none;transition:border-color .15s;}
  input[type="text"]:focus,select:focus{border-color:var(--border2);}
  input[type="text"]::placeholder{color:var(--text3);}
  select option{background:var(--bg3);}

  .btn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;padding:0 16px;height:36px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;}
  .btn:hover{color:var(--gold);border-color:var(--gold);}
  .btn.gold{border-color:var(--gold);color:var(--gold);background:rgba(200,169,110,.07);}
  .btn.gold:hover{background:rgba(200,169,110,.14);}
  .btn.danger{border-color:var(--danger);color:var(--danger);}

  /* Maxroll-style table */
  .item-table{width:100%;border-collapse:collapse;}
  .item-table thead tr{border-bottom:1px solid var(--border2);}
  .item-table thead th{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;padding:6px 10px;text-align:left;font-weight:400;}
  .item-table thead th.th-stats{text-align:center;}
  .item-table thead th.th-right{text-align:right;}
  .item-table tbody tr{border-bottom:0.5px solid var(--border);transition:background .1s;cursor:default;}
  .item-table tbody tr:hover{background:var(--bg3);}
  .item-td-name{padding:10px 10px 10px 8px;width:38%;}
  .item-td-lvl{padding:10px;width:60px;text-align:center;font-size:13px;color:var(--text2);}
  .item-td-stats{padding:10px 12px;text-align:center;}
  .item-td-char{padding:10px;width:130px;text-align:right;}
  .item-td-act{padding:10px 8px 10px 0;width:110px;text-align:right;}
  .item-name-cell{display:flex;align-items:center;gap:10px;}
  .item-name-cell img{width:36px;height:36px;object-fit:contain;image-rendering:pixelated;flex-shrink:0;}
  .item-name-main{font-size:14px;font-weight:600;cursor:pointer;transition:color .1s;line-height:1.3;}
  .item-name-main:hover{color:var(--gold2);}
  .item-name-main.set{color:var(--set);}
  .item-name-main.unique{color:var(--unique);}
  .item-name-main.runeword{color:#b89050;}
  .item-name-main.socketed{color:var(--sock);}
  .item-name-sub{font-size:11px;color:var(--text3);margin-top:1px;}
  .item-stat-line{font-size:12px;color:#6a7fc1;line-height:1.6;}
  .item-stat-line.fixed-stat{color:var(--text3);}
  .item-char-badge{font-size:11px;color:var(--text2);}
  .class-badge{display:inline-block;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.05em;padding:2px 6px;border-radius:2px;border:0.5px solid;text-transform:uppercase;margin-left:4px;}
  .class-amazon{color:#7aad4a;border-color:#2a5c1a;background:#0d1f08;}
  .class-necromancer{color:#9a7cad;border-color:#3a2a5c;background:#100a1f;}
  .class-paladin{color:#adad4a;border-color:#5c5c1a;background:#1f1f08;}
  .class-sorceress{color:#4aaaad;border-color:#1a5c5c;background:#081f1f;}
  .class-barbarian{color:#ad4a4a;border-color:#5c1a1a;background:#1f0808;}
  .class-druid{color:#ad7a4a;border-color:#5c3a1a;background:#1f1008;}
  .class-assassin{color:#7a7aad;border-color:#2a2a5c;background:#08081f;}
  .class-warlock{color:#c87aad;border-color:#5c2a4c;background:#1f0818;}
  .class-bank{color:#666;border-color:#444;background:transparent;}
  .item-name{font-size:15px;font-weight:600;cursor:pointer;transition:color .1s;}
  .item-name:hover{color:var(--gold2);}
  .item-name.set{color:var(--set);}
  .item-name.unique{color:var(--unique);}
  .item-name.socketed{color:var(--sock);}
  .item-sub{font-size:12px;color:var(--text3);margin-top:1px;font-style:italic;}
  .item-stats-preview{font-size:11px;color:var(--text3);margin-top:2px;}
  .tag{display:inline-block;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.05em;padding:3px 8px;border-radius:2px;border:0.5px solid;text-transform:uppercase;}
  .tag.set{color:var(--set);background:var(--set-bg);border-color:var(--set-border);}
  .tag.unique{color:var(--unique);background:var(--unique-bg);border-color:var(--unique-border);}
  .tag.socketed{color:var(--sock);background:var(--sock-bg);border-color:var(--sock-border);}
  .char-name{font-size:13px;color:var(--text2);}
  .status-btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.04em;padding:4px 8px;border-radius:2px;border:0.5px solid;cursor:pointer;background:transparent;white-space:nowrap;width:100px;text-align:center;transition:all .1s;}
  .status-btn.stored{color:var(--stored);border-color:#444;}
  .status-btn.equipped{color:var(--equipped);border-color:var(--set-border);background:var(--set-bg);}
  .status-btn.seeking{color:var(--seeking);border-color:var(--unique-border);background:var(--unique-bg);}
  .status-btn.complete{color:var(--complete);border-color:#3a2a5c;background:var(--complete-bg);}
  .del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:0;transition:color .1s;}
  .del-btn:hover{color:var(--danger);}
  .empty{text-align:center;padding:3rem;color:var(--text3);font-style:italic;font-size:15px;border:0.5px dashed var(--border);border-radius:var(--radius);}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;}
  .overlay.open{display:flex;}
  .modal{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:1.75rem;width:min(500px,92vw);max-height:90vh;overflow-y:auto;}
  .modal-title{font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:var(--gold);margin-bottom:1.25rem;letter-spacing:.06em;padding-bottom:10px;border-bottom:0.5px solid var(--border);}
  .modal-item-header{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:1rem;}
  .modal-item-name{font-size:16px;font-weight:600;}
  .modal-item-name.set{color:var(--set);}
  .modal-item-name.unique{color:var(--unique);}
  .modal-item-name.socketed{color:var(--sock);}
  .modal-item-set{font-size:12px;color:var(--text3);font-style:italic;margin-top:2px;}
  .form-row{margin-bottom:14px;}
  .form-row label{display:block;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
  .form-row input,.form-row select,.form-row textarea{width:100%;font-size:15px;height:auto;padding:8px 12px;}
  .form-row textarea{height:72px;resize:vertical;font-family:'Crimson Text',serif;}

  .stats-editor{border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:14px;}
  .stats-editor-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
  .stat-line{display:flex;align-items:baseline;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
  .stat-fixed{font-size:13px;color:var(--text3);font-style:italic;}
  .stat-label{font-size:13px;color:var(--text);}
  .stat-range{font-size:12px;color:var(--text3);}
  .stat-input{font-size:13px;padding:3px 7px;height:26px;width:64px;text-align:center;}
  .stat-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
  .stat-name-input{font-size:13px;padding:5px 8px;height:30px;flex:1;}
  .stat-val-input{font-size:13px;padding:5px 8px;height:30px;width:90px;}
  .stat-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0;line-height:1;}
  .stat-remove:hover{color:var(--danger);}
  .add-stat-btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.05em;padding:5px 12px;border:0.5px dashed var(--border2);color:var(--text2);background:transparent;border-radius:2px;cursor:pointer;margin-top:8px;width:100%;}
  .add-stat-btn:hover{border-color:var(--gold);color:var(--gold);}
  .sockets-line{display:flex;align-items:baseline;gap:6px;margin-bottom:6px;padding-top:6px;border-top:0.5px solid var(--border);}
  .sockets-label{font-size:13px;color:var(--gold);}

  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid var(--border);}

  .settings-section{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem;}
  .settings-title{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--gold);letter-spacing:.06em;margin-bottom:1rem;padding-bottom:8px;border-bottom:0.5px solid var(--border);}
  .char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:1rem;}
  .char-item{display:flex;flex-direction:column;gap:4px;}
  .char-item label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);}
  .char-item input{width:100%;font-size:14px;padding:6px 10px;height:32px;}
  .char-item.active-slot input{border-color:var(--unique-border);}
  .type-badge{font-size:9px;font-family:'Cinzel',serif;letter-spacing:.05em;text-transform:uppercase;margin-left:4px;color:var(--text3);}
  .section-divider{display:flex;align-items:center;gap:10px;margin:1.25rem 0 1rem;color:var(--text3);font-family:'Cinzel',serif;font-size:10px;letter-spacing:.08em;text-transform:uppercase;}
  .section-divider::before,.section-divider::after{content:'';flex:1;height:0.5px;background:var(--border);}


  .item-img{width:40px;height:40px;object-fit:contain;image-rendering:pixelated;flex-shrink:0;opacity:.9;}
  .item-img-lg{width:72px;height:72px;object-fit:contain;image-rendering:pixelated;margin-right:12px;}
  .item-img-sm{width:24px;height:24px;object-fit:contain;image-rendering:pixelated;flex-shrink:0;margin-right:6px;}
  .modal-item-header{display:flex;align-items:center;}
  .drag-handle{cursor:grab;color:var(--text3);font-size:16px;padding:0 6px;user-select:none;}
  .drag-handle:active{cursor:grabbing;}
  .char-item.drag-over{border-top:2px solid var(--gold);}
  .set-part-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-top:0.5px solid var(--border);gap:8px;}
  .set-part-info{flex:1;min-width:0;}
  .set-part-name{font-size:14px;font-weight:500;}
  .set-part-stats{font-size:11px;color:var(--text3);margin-top:2px;}
  .set-part-char{font-size:12px;color:var(--text2);}
  .ac-img{width:28px;height:28px;object-fit:contain;image-rendering:pixelated;flex-shrink:0;}
  .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg3);border:0.5px solid var(--set-border);color:var(--set);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.05em;padding:10px 16px;border-radius:var(--radius);z-index:300;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-rune">⚔</div>D2R Stash Tracker</div>
  <nav>
    <button class="nav-btn active" onclick="showPage('items',this)">Stash</button>
    <button class="nav-btn" onclick="showPage('sets',this)">Set-progress</button>
    <button class="nav-btn" onclick="showPage('settings',this)">Inställningar</button>
  </nav>
</header>

<main>
  <div class="page active" id="page-items">
    <div class="universal-search">
      <input type="text" id="unisearch" placeholder="Sök item — hitta var det ligger eller lägg till nytt..." autocomplete="off"
        oninput="handleUniSearch()" onkeydown="handleUniKey(event)" onfocus="handleUniSearch()">
      <div class="autocomplete" id="autocomplete" style="display:none"></div>
      <div class="search-hint">Sök på itemnamn för att se var det finns i stashen, eller lägg till ett nytt</div>
    </div>

    <div class="stats-bar" id="stats"></div>

    <div class="filters">
      <select id="filter-cat" onchange="renderItems()">
        <option value="">Alla kategorier</option>
        <option value="Set">Set-delar</option>
        <option value="Unique">Unika items</option>
        <option value="Socketed">Socketed items</option>
        <option value="Runeword">Runewords</option>
      </select>
      <select id="filter-char" onchange="renderItems()">
        <option value="">Alla karaktärer</option>
      </select>
      <select id="filter-status" onchange="renderItems()">
        <option value="">Alla statusar</option>
        <option value="stored">Sparad</option>
        <option value="equipped">Utrustad</option>
        <option value="seeking">Sökes</option>
        <option value="complete">Komplett</option>
      </select>
    </div>

    <table class="item-table">
      <thead>
        <tr>
          <th>Namn</th>
          <th class="th-right" style="text-align:center">Rlvl</th>
          <th class="th-stats">Stats</th>
          <th class="th-right">Karaktär</th>
          <th class="th-right">Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>

  <div class="page" id="page-sets">
    <div class="section-divider">Set-progress</div>
    <div id="sets-content"></div>
  </div>

  <div class="page" id="page-settings">
    <div class="settings-section">
      <div class="settings-title">Karaktärer</div>
      <p style="font-size:14px;color:var(--text2);margin-bottom:1rem;font-style:italic">Dra ⠿ för att ändra ordning. Klicka namn eller klass för att redigera.</p>
      <div id="char-grid" style="margin-bottom:1rem"></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="text" id="new-char-name" placeholder="Karaktärsnamn..." style="width:180px">
        <select id="new-char-cls">
          <option value="">Klass...</option>
          <option value="Amazon">Amazon</option>
          <option value="Barbarian">Barbarian</option>
          <option value="Druid">Druid</option>
          <option value="Necromancer">Necromancer</option>
          <option value="Paladin">Paladin</option>
          <option value="Sorceress">Sorceress</option>
          <option value="Assassin">Assassin</option>
          <option value="Warlock">Warlock</option>
          <option value="Bank">Bank</option>
        </select>
        <button class="btn gold" onclick="addChar()">+ Lägg till</button>
        <button class="btn" onclick="saveChars()" style="margin-left:auto">Spara ordning</button>
        <button class="btn" onclick="resetChars()">Återställ</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-title">Data</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="exportData()">Exportera JSON</button>
        <label class="btn" style="display:inline-flex;align-items:center;cursor:pointer">
          Importera JSON
          <input type="file" accept=".json" onchange="importData(event)" style="display:none">
        </label>
      </div>
    </div>
  </div>
</main>

<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Lägg till item</div>

    <div class="modal-item-header" id="modal-item-header" style="display:none">
      <div class="modal-item-name" id="modal-item-name-display"></div>
      <div class="modal-item-set" id="modal-item-set-display"></div>
    </div>

    <div class="form-row" id="f-name-row">
      <label>Itemnamn</label>
      <input type="text" id="f-name" placeholder="t.ex. Shako, Mara's Kaleidoscope...">
    </div>
    <div class="form-row" id="f-cat-row">
      <label>Kategori</label>
      <select id="f-cat" onchange="toggleSetName()">
        <option value="Set">Set-del</option>
        <option value="Unique">Unikt item</option>
        <option value="Socketed">Socketed item</option>
      </select>
    </div>
    <div class="form-row" id="f-setname-row">
      <label>Set-namn</label>
      <input type="text" id="f-setname" placeholder="t.ex. Tal Rasha's Wrappings">
    </div>

    <div class="form-row">
      <label>Karaktär / bank-slot</label>
      <select id="f-char"></select>
    </div>
    <div class="form-row">
      <label>Status</label>
      <select id="f-status">
        <option value="stored">Sparad</option>
        <option value="equipped">Utrustad</option>
        <option value="seeking">Sökes</option>
        <option value="complete">Komplett set</option>
      </select>
    </div>

    <div class="stats-editor" id="stats-editor">
      <div class="stats-editor-title">Stats &amp; rolls</div>
      <div id="stats-rows"></div>
      <div id="stats-custom"></div>
      <button class="add-stat-btn" onclick="addCustomStatRow()">+ Lägg till eget</button>
    </div>

    <div class="form-row">
      <label>Anteckningar</label>
      <textarea id="f-notes" placeholder="Socklar, noter, etc..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Avbryt</button>
      <button class="btn gold" onclick="saveItem()">Spara</button>
    </div>
  </div>
</div>


<!-- SET MODAL -->
<div class="overlay" id="set-modal">
  <div class="modal" style="width:min(680px,95vw)">
    <div class="modal-title" id="set-modal-title">Set</div>
    <div id="set-modal-body"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeSetModal()">Stäng</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer style="position:fixed;bottom:0;right:0;padding:6px 12px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.05em;color:var(--text3);pointer-events:none;z-index:50">
  __VERSION__ · __COMMIT__ · __DATE__
</footer>

<script>
// ── Utility functions (must be defined first) ────────────────────────────────
function itemSlug(name){
  if(!name)return '';
  return name.toLowerCase().replace(/'/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}
function imgSrc(slug){ return slug?`/api/itemimg/${encodeURIComponent(slug)}`:''; }

let items=[],chars=[],d2db=[];
let editId=null,acFocusIdx=-1;
const STATUS_LABEL={stored:'Sparad',equipped:'Utrustad',seeking:'Sökes',complete:'Komplett'};
const STATUS_ORDER=['stored','equipped','seeking','complete'];

function itemSlug(name){
  if(!name)return'';
  return name.toLowerCase().replace(/'/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}

async function api(method,path,body){
  const r=await fetch(path,{method,headers:body?{'Content-Type':'application/json'}:{},body:body?JSON.stringify(body):undefined});
  return r.json();
}

async function loadAll(){
  try {
    [items,chars,d2db]=await Promise.all([
      api('GET','/api/items'),
      api('GET','/api/characters'),
      fetch('/d2db.json').then(r=>r.json())
    ]);
  } catch(e) {
    console.error('loadAll error',e);
    items=items||[];chars=chars||[];d2db=d2db||[];
  }
  populateCharSelects();
  renderStats();
  renderItems();
  renderSets();
  renderCharGrid();
  const ncn=document.getElementById('new-char-name');
  if(ncn) ncn.addEventListener('keydown',e=>{if(e.key==='Enter')addChar();});
}

function populateCharSelects(){
  const fs=document.getElementById('filter-char'),fc=document.getElementById('f-char');
  const cur=fs.value;
  fs.innerHTML='<option value="">Alla karaktärer</option>';
  fc.innerHTML='';
  const sorted=[...chars].sort((a,b)=>(a.order||0)-(b.order||0));
  sorted.forEach(c=>{
    const label=c.cls?`${c.name} (${c.cls})`:c.name;
    fs.appendChild(new Option(label,c.name));
    fc.appendChild(new Option(label,c.name));
  });
  fs.value=cur||'';
  if(!fc.value&&sorted.length)fc.value=sorted[0].name;
}

// Universal search
function handleUniSearch(){
  const q=document.getElementById('unisearch').value.trim().toLowerCase();
  const ac=document.getElementById('autocomplete');
  acFocusIdx=-1;
  if(q.length<2){ac.style.display='none';return;}
  if(!d2db||!d2db.length){ac.style.display='none';return;}

  const stashMatches=items.filter(i=>i.name.toLowerCase().includes(q));
  const dbMatches=d2db.filter(i=>i.name.toLowerCase().includes(q));
  const dbNew=dbMatches.filter(d=>!stashMatches.find(s=>s.name===d.name)).slice(0,8);

  if(!stashMatches.length&&!dbNew.length){ac.style.display='none';return;}

  let html='';

  // Group stash matches by name for deduplication display
  const stashByName={};
  stashMatches.forEach(item=>{
    if(!stashByName[item.name]) stashByName[item.name]=[];
    stashByName[item.name].push(item);
  });

  if(stashMatches.length){
    html+=`<div class="ac-section">I din stash (${stashMatches.length})</div>`;
    Object.entries(stashByName).forEach(([name,itemList])=>{
      const first=itemList[0];
      const cls=first.cat==='Set'?'set':first.cat==='Unique'?'unique':first.cat==='Runeword'?'runeword':'socketed';
      const sub=first.setname?`<div class="ac-item-sub">${first.setname}</div>`:'';
      const slug=first.img||itemSlug(first.name);
      const imgTag=`<img class="ac-img" src="/api/itemimg/${slug}" onerror="this.style.display='none'" loading="lazy">`;
      const charInfo=itemList.map(i=>`<span class="ac-stash">${i.char||'—'}</span>`).join(' ');
      const isSet=first.cat==='Set'&&first.setname;
      const action=isSet?'viewset':'edit';
      html+=`<div class="ac-item" data-action="${action}" data-id="${first.id}" data-setname="${first.setname||''}">
        ${imgTag}
        <div style="flex:1;min-width:0"><div class="ac-item-name ${cls}">${name}</div>${sub}</div>
        <div class="ac-item-right">${charInfo}<span class="ac-action-btn">${isSet?'Visa set':'Redigera'}</span></div>
      </div>`;
    });
  }

  if(dbNew.length){
    html+=`<div class="ac-section">Lägg till</div>`;
    dbNew.forEach(db=>{
      const cls=db.cat==='Set'?'set':db.cat==='Unique'?'unique':db.cat==='Runeword'?'runeword':'socketed';
      const sub=db.setname?`<div class="ac-item-sub">${db.setname}</div>`:'';
      const slug=db.img||itemSlug(db.name);
      const imgTag=`<img class="ac-img" src="/api/itemimg/${slug}" onerror="this.style.display='none'" loading="lazy">`;
      let extra='';
      if(db.cat==='Runeword'){
        const runes=(db.runes||[]).join(' + ');
        const bases=(db.base||[]).join(', ');
        extra=`<div class="ac-item-sub rw-recipe">${runes} · ${db.sockets}os · ${bases} · Rlvl ${db.rlvl}</div>`;
      }
      const isSet=db.cat==='Set'&&db.setname;
      html+=`<div class="ac-item" data-action="${isSet?'addset':'adddb'}" data-name="${encodeURIComponent(db.name)}" data-setname="${db.setname||''}">
        ${imgTag}
        <div style="flex:1;min-width:0"><div class="ac-item-name ${cls}">${db.name}</div>${sub}${extra}</div>
        <div class="ac-item-right"><span class="ac-action-btn add">${isSet?'Lägg till set':'+ Lägg till'}</span></div>
      </div>`;
    });
  }

  const rawQ=document.getElementById('unisearch').value.trim();
  html+=`<div class="ac-new" id="ac-new-custom">
    <div class="ac-new-label">Lägg till "${rawQ}" manuellt</div>
    <span class="ac-new-tag">Anpassat</span>
  </div>`;

  ac.innerHTML=html;
  ac.style.display='block';

  ac.querySelectorAll('.ac-item[data-action="edit"]').forEach(el=>{
    el.addEventListener('click',()=>{openEdit(el.dataset.id);closeAC();});
  });
  ac.querySelectorAll('.ac-item[data-action="viewset"]').forEach(el=>{
    el.addEventListener('click',()=>{openSetModal(el.dataset.setname);closeAC();});
  });
  ac.querySelectorAll('.ac-item[data-action="adddb"]').forEach(el=>{
    el.addEventListener('click',()=>{
      const name=decodeURIComponent(el.dataset.name);
      const db=d2db.find(d=>d.name===name);
      if(db){openAddFromDB(db);closeAC();}
    });
  });
  ac.querySelectorAll('.ac-item[data-action="addset"]').forEach(el=>{
    el.addEventListener('click',()=>{
      openSetModal(el.dataset.setname,true);closeAC();
    });
  });
  document.getElementById('ac-new-custom')?.addEventListener('click',()=>{
    openAddCustom(document.getElementById('unisearch').value.trim());closeAC();
  });
}

function handleUniKey(e){
  const ac=document.getElementById('autocomplete');
  if(ac.style.display==='none')return;
  const rows=ac.querySelectorAll('.ac-item,.ac-new');
  if(e.key==='ArrowDown'){acFocusIdx=Math.min(acFocusIdx+1,rows.length-1);updateACFocus(rows);e.preventDefault();}
  else if(e.key==='ArrowUp'){acFocusIdx=Math.max(acFocusIdx-1,0);updateACFocus(rows);e.preventDefault();}
  else if(e.key==='Enter'&&acFocusIdx>=0){rows[acFocusIdx].click();e.preventDefault();}
  else if(e.key==='Escape'){closeAC();}
}
function updateACFocus(rows){
  rows.forEach((r,i)=>r.classList.toggle('focused',i===acFocusIdx));
  if(rows[acFocusIdx])rows[acFocusIdx].scrollIntoView({block:'nearest'});
}
function closeAC(){document.getElementById('autocomplete').style.display='none';acFocusIdx=-1;}
document.addEventListener('click',e=>{
  if(!document.getElementById('unisearch').contains(e.target)&&!document.getElementById('autocomplete').contains(e.target))closeAC();
});

// Modal helpers
function showFromDB(dbItem){
  const cls=dbItem.cat==='Set'?'set':dbItem.cat==='Unique'?'unique':'socketed';
  document.getElementById('modal-item-name-display').textContent=dbItem.name;
  document.getElementById('modal-item-name-display').className='modal-item-name '+cls;
  let subtext=dbItem.setname||'';
  if(dbItem.cat==='Runeword'&&dbItem.runes){
    subtext=(dbItem.runes.join(' + '))+' · '+(dbItem.sockets)+'os '+((dbItem.base||[]).join(', '))+' · Rlvl '+(dbItem.rlvl||'?');
  }
  document.getElementById('modal-item-set-display').textContent=subtext;
  if(dbItem.cat==='Runeword') document.getElementById('modal-item-set-display').style.color='#b89050';
  else document.getElementById('modal-item-set-display').style.color='';
  document.getElementById('modal-item-header').style.display='block';
  document.getElementById('f-name-row').style.display='none';
  document.getElementById('f-cat-row').style.display='none';
  document.getElementById('f-setname-row').style.display='none';
  document.getElementById('f-cat').value=dbItem.cat;
  document.getElementById('f-name').value=dbItem.name;
  document.getElementById('f-setname').value=dbItem.setname||'';
}

function showManual(){
  document.getElementById('modal-item-header').style.display='none';
  document.getElementById('f-name-row').style.display='block';
  document.getElementById('f-cat-row').style.display='block';
  toggleSetName();
}

function openAddFromDB(dbItem){
  editId=null;clearModal();
  document.getElementById('modal-title').textContent='Lägg till item';
  showFromDB(dbItem);
  document.getElementById('f-char').value=chars[0]?.name||'';
  document.getElementById('f-status').value='stored';
  renderStructuredStats(dbItem);
  document.getElementById('modal').classList.add('open');
  document.getElementById('unisearch').value='';
}

function openAddCustom(name){
  editId=null;clearModal();
  document.getElementById('modal-title').textContent='Lägg till item';
  showManual();
  document.getElementById('f-name').value=name||'';
  document.getElementById('f-cat').value='Unique';
  document.getElementById('f-setname').value='';
  document.getElementById('f-char').value=chars[0]?.name||'';
  document.getElementById('f-status').value='stored';
  document.getElementById('modal').classList.add('open');
  document.getElementById('unisearch').value='';
}

function openEdit(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  editId=id;clearModal();
  document.getElementById('modal-title').textContent='Redigera item';
  showFromDB({name:item.name,cat:item.cat,setname:item.setname||''});
  document.getElementById('f-char').value=item.char;
  document.getElementById('f-status').value=item.status;
  document.getElementById('f-notes').value=item.notes||'';
  // Find DB item for structured display
  const dbRef=d2db.find(d=>d.name===item.name&&d.cat===item.cat);
  renderStructuredStats(dbRef||null);
  // Restore saved values
  if(item.stats&&item.stats.length){
    item.stats.forEach(sv=>{
      if(sv.name==='Sockets'){
        const si=document.querySelector('[data-stat="sockets"]');
        if(si) si.value=sv.value;
        return;
      }
      const inp=document.querySelector(`#stats-rows input[data-statname="${sv.name.replace(/"/g,'')}"]`);
      if(inp){inp.value=sv.value;}
      else{addCustomStatRow(sv.name,sv.value);}
    });
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}
function clearModal(){document.getElementById('stats-rows').innerHTML='';document.getElementById('stats-custom').innerHTML='';document.getElementById('f-notes').value='';}
function toggleSetName(){
  document.getElementById('f-setname-row').style.display=document.getElementById('f-cat').value==='Set'?'block':'none';
}

function renderStructuredStats(dbItem){
  const container=document.getElementById('stats-rows');
  container.innerHTML='';
  if(!dbItem||!dbItem.stats) return;

  // Sockets line
  if(dbItem.sockets){
    const {min,max}=dbItem.sockets;
    const range=min===max?`${min}os`:`${min}-${max}os`;
    const line=document.createElement('div');
    line.className='sockets-line';
    line.innerHTML=`<span class="sockets-label">Sockets</span><span class="stat-range">(${range})</span><input type="number" class="stat-input" min="${min}" max="${max}" placeholder="" data-stat="sockets" style="width:52px">`;
    container.appendChild(line);
  }

  dbItem.stats.forEach((s,i)=>{
    const line=document.createElement('div');
    line.className='stat-line';
    if(s.fixed||(!s.variable&&s.min===undefined)){
      // Fixed stat — just text
      line.innerHTML=`<span class="stat-fixed">${s.name||s.display||''}</span>`;
    } else if(s.variable===false){
      // Fixed value but shown for info
      const val=s.min!==undefined?s.min:'';
      const label=(s.name||'').replace('%d',val).replace('%d%%',val+'%');
      line.innerHTML=`<span class="stat-fixed">${label}</span>`;
    } else {
      // Variable — show label + range + input
      const label=(s.name||'').replace('%d','').replace('%d%%','').trim().replace(/\s+/,' ');
      const range=s.min!==undefined&&s.max!==undefined&&s.min!==s.max?`(${s.min}-${s.max})`:`(${s.min||s.max})`;
      line.innerHTML=`<span class="stat-label">${label}</span><span class="stat-range">${range}</span><input type="text" class="stat-input" placeholder="" data-stat="${i}" data-statname="${(s.name||'').replace(/"/g,'')}" data-min="${s.min||''}" data-max="${s.max||''}">`;
    }
    container.appendChild(line);
  });
}

function addCustomStatRow(name='',value=''){
  const container=document.getElementById('stats-custom');
  const row=document.createElement('div');row.className='stat-row';
  row.innerHTML=`<input type="text" class="stat-name-input" placeholder="Stat..." value="${name}">
    <input type="text" class="stat-val-input" placeholder="Värde" value="${value}">
    <button class="stat-remove" onclick="this.parentElement.remove()">×</button>`;
  container.appendChild(row);
}

function addStatRow(name='',value=''){addCustomStatRow(name,value);}

function getStats(){
  const stats=[];
  // Sockets
  const sockInput=document.querySelector('[data-stat="sockets"]');
  if(sockInput&&sockInput.value) stats.push({name:'Sockets',value:sockInput.value});
  // Structured variable stats
  document.querySelectorAll('#stats-rows input[data-stat]:not([data-stat="sockets"])').forEach(inp=>{
    if(inp.value.trim()){
      const label=inp.dataset.statname||inp.dataset.stat;
      stats.push({name:label,value:inp.value.trim(),min:inp.dataset.min,max:inp.dataset.max});
    }
  });
  // Custom stats
  document.querySelectorAll('#stats-custom .stat-row').forEach(row=>{
    const n=row.querySelector('.stat-name-input').value.trim();
    const v=row.querySelector('.stat-val-input').value.trim();
    if(n) stats.push({name:n,value:v});
  });
  return stats;
}

async function saveItem(){
  const name=document.getElementById('f-name-row').style.display!=='none'
    ?document.getElementById('f-name').value.trim()
    :document.getElementById('modal-item-name-display').textContent.trim();
  if(!name)return;
  const payload={
    name,
    cat:document.getElementById('f-cat').value,
    setname:document.getElementById('f-setname').value.trim()||document.getElementById('modal-item-set-display').textContent.trim(),
    char:document.getElementById('f-char').value,
    status:document.getElementById('f-status').value,
    stats:getStats(),
    notes:document.getElementById('f-notes').value.trim()
  };
  if(editId){
    const updated=await api('PUT',`/api/items/${editId}`,payload);
    items[items.findIndex(i=>i.id===editId)]=updated;
    toast('Item uppdaterat');
  }else{
    items.unshift(await api('POST','/api/items',payload));
    toast('Item tillagt');
  }
  closeModal();renderStats();renderItems();renderSets();
}

async function deleteItem(id){
  if(!confirm('Ta bort item?'))return;
  await api('DELETE',`/api/items/${id}`);
  items=items.filter(i=>i.id!==id);
  renderStats();renderItems();renderSets();toast('Item borttaget');
}

async function cycleStatus(id){
  const item=items.find(i=>i.id===id);if(!item)return;
  item.status=STATUS_ORDER[(STATUS_ORDER.indexOf(item.status)+1)%STATUS_ORDER.length];
  await api('PUT',`/api/items/${id}`,item);
  renderItems();renderSets();toast('Status uppdaterad');
}

function renderStats(){
  const t=items.length,s=items.filter(i=>i.cat==='Set').length,u=items.filter(i=>i.cat==='Unique').length,k=items.filter(i=>i.cat==='Socketed'||i.cat==='Runeword').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">Totalt</div><div class="stat-val">${t}</div></div>
    <div class="stat-card"><div class="stat-label">Set-delar</div><div class="stat-val">${s}</div></div>
    <div class="stat-card"><div class="stat-label">Unika items</div><div class="stat-val">${u}</div></div>
    <div class="stat-card"><div class="stat-label">Socketed</div><div class="stat-val">${k}</div></div>`;
}

function classBadge(c){
  if(!c||!c.cls)return '';
  const cn='class-'+(c.cls||'bank').toLowerCase().replace(/\s+/,'-');
  return `<span class="class-badge ${cn}">${c.cls}</span>`;
}

function charDisplay(charName){
  const c=chars.find(x=>x.name===charName);
  const badge=c&&c.cls?classBadge(c):'';
  return `<span class="item-char-badge">${charName||'—'}${badge}</span>`;
}

function renderItems(){
  const cat=document.getElementById('filter-cat').value;
  const char=document.getElementById('filter-char').value;
  const status=document.getElementById('filter-status').value;
  const filtered=items.filter(i=>{
    if(cat&&i.cat!==cat)return false;
    if(char&&i.char!==char)return false;
    if(status&&i.status!==status)return false;
    return true;
  });
  const list=document.getElementById('list');
  if(!filtered.length){
    list.innerHTML=`<tr><td colspan="6" style="padding:3rem;text-align:center;color:var(--text3);font-style:italic">Inga items matchar filtret</td></tr>`;
    return;
  }
  list.innerHTML=filtered.map(i=>{
    const cls=i.cat==='Set'?'set':i.cat==='Unique'?'unique':i.cat==='Runeword'?'runeword':'socketed';
    const dbRef=d2db.find(d=>d.name===i.name&&d.cat===i.cat);
    const rlvl=dbRef&&dbRef.rlvl?dbRef.rlvl:(i.rlvl||'—');
    const slug=(dbRef&&dbRef.img)||itemSlug(i.name);
    // Sub label
    let sublabel='';
    if(i.cat==='Set'&&i.setname) sublabel=i.setname;
    else if(i.cat==='Runeword'&&dbRef&&dbRef.runes) sublabel=(dbRef.base||[]).join(', ');
    // Stats — show saved rolls or db stats
    const statLines=[];
    if(i.stats&&i.stats.length){
      i.stats.filter(s=>s.value).slice(0,5).forEach(s=>{
        const label=s.name?s.name.replace('%d',s.value).replace('%d%%',s.value+'%'):'';
        statLines.push(`<div class="item-stat-line">${label||s.name}: ${s.value}</div>`);
      });
    } else if(dbRef&&dbRef.stats){
      dbRef.stats.filter(s=>s.fixed||(s.variable===false)).slice(0,4).forEach(s=>{
        const label=s.fixed?s.name:(s.name||'').replace('%d',s.min).replace('%d%%',s.min+'%');
        statLines.push(`<div class="item-stat-line fixed-stat">${label}</div>`);
      });
    }
    return `<tr>
      <td class="item-td-name">
        <div class="item-name-cell">
          <img src="/api/itemimg/${slug}" onerror="this.style.display='none'" loading="lazy">
          <div>
            <div class="item-name-main ${cls}" onclick="openEdit('${i.id}')">${i.name}</div>
            ${sublabel?`<div class="item-name-sub">${sublabel}</div>`:''}
          </div>
        </div>
      </td>
      <td class="item-td-lvl">${rlvl}</td>
      <td class="item-td-stats">${statLines.join('')||'<span style="color:var(--text3);font-size:12px">—</span>'}</td>
      <td class="item-td-char">${charDisplay(i.char)}</td>
      <td class="item-td-act"><button class="status-btn ${i.status}" onclick="cycleStatus('${i.id}')">${STATUS_LABEL[i.status]||i.status}</button></td>
      <td style="padding:10px 8px 10px 0;text-align:right"><button class="del-btn" onclick="deleteItem('${i.id}')">×</button></td>
    </tr>`;
  }).join('');
}

function renderSets(){
  const setItems=items.filter(i=>i.cat==='Set'&&i.setname);
  const groups={};
  setItems.forEach(i=>{if(!groups[i.setname])groups[i.setname]=[];groups[i.setname].push(i);});
  const content=document.getElementById('sets-content');
  if(!Object.keys(groups).length){content.innerHTML='<div class="empty">Inga set-delar registrerade än</div>';return;}
  content.innerHTML=Object.entries(groups).map(([setname,parts])=>{
    const hasAll=parts.every(p=>p.status!=='seeking');
    return `<div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <span style="font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--set)">${setname}</span>
        <span style="font-size:12px;color:var(--text3);font-family:'Cinzel',serif">${parts.length} delar${hasAll?' · Komplett!':''}</span>
      </div>
      ${parts.map(p=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-top:0.5px solid var(--border)">
        <div>
          <span style="font-size:14px">${p.name}</span>
          ${p.stats&&p.stats.length?`<div class="item-stats-preview">${p.stats.slice(0,2).map(s=>`${s.name}: ${s.value}`).join(' · ')}</div>`:''}
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          <span style="font-size:12px;color:var(--text3)">${p.char}</span>
          <button class="status-btn ${p.status}" onclick="cycleStatus('${p.id}')" style="width:80px">${STATUS_LABEL[p.status]}</button>
        </div>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function renderCharGrid(){
  const grid=document.getElementById('char-grid');
  const sorted=[...chars].sort((a,b)=>(a.order||0)-(b.order||0));
  grid.innerHTML=sorted.map(c=>{
    const cn='class-'+(c.cls||'bank').toLowerCase().replace(/\s+/g,'-');
    const badge=c.cls?`<span class="class-badge ${cn}">${c.cls}</span>`:'<span class="class-badge class-bank">Bank</span>';
    return `<div class="char-item" draggable="true" data-char-id="${c.id}" style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:4px">
      <span class="drag-handle" title="Dra för att ändra ordning">⠿</span>
      <span style="font-size:14px;flex:1">${c.name}</span>
      ${badge}
      <select class="char-cls-sel" data-char-id="${c.id}" style="font-size:12px;height:26px;padding:2px 6px;width:120px">
        <option value="">Klass...</option>
        ${['Amazon','Barbarian','Druid','Necromancer','Paladin','Sorceress','Assassin','Warlock','Bank'].map(cl=>`<option value="${cl}"${c.cls===cl?' selected':''}>${cl}</option>`).join('')}
      </select>
      <input type="text" value="${c.name}" data-char-id="${c.id}" style="font-size:13px;height:26px;padding:2px 8px;width:130px">
      <button class="del-btn" onclick="removeChar(${c.id})" title="Ta bort">×</button>
    </div>`;
  }).join('');

  // Drag ordering
  let dragSrc=null;
  grid.querySelectorAll('.char-item').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragSrc=el;e.dataTransfer.effectAllowed='move';el.style.opacity='.4';});
    el.addEventListener('dragend',()=>{el.style.opacity='1';grid.querySelectorAll('.char-item').forEach(r=>r.classList.remove('drag-over'));});
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{
      e.preventDefault();el.classList.remove('drag-over');
      if(dragSrc===el)return;
      const all=[...grid.querySelectorAll('.char-item')];
      if(all.indexOf(dragSrc)<all.indexOf(el))el.after(dragSrc);else el.before(dragSrc);
      const newOrder=[...grid.querySelectorAll('.char-item')].map(r=>r.dataset.charId);
      chars=[...chars].sort((a,b)=>newOrder.indexOf(String(a.id))-newOrder.indexOf(String(b.id)));
      chars=chars.map((c,i)=>({...c,order:i+1}));
      populateCharSelects();
    });
  });

  // Live cls change
  grid.querySelectorAll('.char-cls-sel').forEach(sel=>{
    sel.addEventListener('change',()=>{
      const c=chars.find(x=>x.id==sel.dataset.charId);
      if(c){c.cls=sel.value;renderItems();}
    });
  });
}

function addChar(){
  const nameEl=document.getElementById('new-char-name');
  const name=nameEl.value.trim();
  if(!name)return;
  const cls=document.getElementById('new-char-cls').value;
  const newId=Math.max(0,...chars.map(c=>c.id))+1;
  chars.push({id:newId,name,cls,type:cls==='Bank'?'bank':'active',order:chars.length+1});
  nameEl.value='';
  document.getElementById('new-char-cls').value='';
  populateCharSelects();renderCharGrid();
}

function removeChar(id){
  if(!confirm('Ta bort karaktär?'))return;
  chars=chars.filter(c=>c.id!==id);
  chars=chars.map((c,i)=>({...c,order:i+1}));
  populateCharSelects();renderCharGrid();
}

async function saveChars(){
  // Read any inline name edits
  document.querySelectorAll('#char-grid input[data-char-id]').forEach(inp=>{
    const c=chars.find(x=>x.id==inp.dataset.charId);
    if(c&&inp.value.trim()) c.name=inp.value.trim();
  });
  const ordered=chars.map((c,i)=>({...c,order:i+1}));
  await api('PUT','/api/characters',ordered);
  chars=ordered;
  populateCharSelects();renderItems();renderCharGrid();
  toast('Karaktärer sparade');
}

async function resetChars(){
  if(!confirm('Återställ?'))return;
  await api('PUT','/api/characters',null);await loadAll();toast('Återställt');
}

function exportData(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({items,chars},null,2)],{type:'application/json'}));
  a.download=`d2r-stash-${new Date().toISOString().slice(0,10)}.json`;a.click();
}

function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{const data=JSON.parse(e.target.result);
      if(data.items)for(const item of data.items)await api('POST','/api/items',item);
      if(data.chars)await api('PUT','/api/characters',data.chars);
      await loadAll();toast('Import klar');
    }catch{toast('Fel vid import');}
  };
  reader.readAsText(file);
}


function openSetModal(setname, addMode=false){
  if(!setname)return;
  const dbParts=d2db.filter(d=>d.cat==='Set'&&d.setname===setname);
  const stashParts=items.filter(i=>i.cat==='Set'&&i.setname===setname);
  document.getElementById('set-modal-title').textContent=setname;

  let html='';
  if(addMode){
    html+=`<p style="font-size:13px;color:var(--text2);margin-bottom:1rem;font-style:italic">
      ${dbParts.length} delar i detta set. Lägg till de delar du har:</p>`;
  } else {
    const have=stashParts.length, total=dbParts.length;
    html+=`<div style="font-family:'Cinzel',serif;font-size:11px;color:var(--text3);margin-bottom:1rem;letter-spacing:.05em">
      ${have}/${total} DELAR HITTADE</div>`;
  }

  dbParts.forEach(dbPart=>{
    const stashItem=stashParts.find(s=>s.name===dbPart.name);
    const cls='set';
    const slug=dbPart.img||itemSlug(dbPart.name);
    const topStats=(dbPart.stats||[]).filter(s=>s.variable||s.fixed).slice(0,3)
      .map(s=>s.fixed?s.name:(s.name||'').replace('%d',`${s.min}${s.min!==s.max?'-'+s.max:''}`))
      .join(' · ');

    html+=`<div class="set-part-row">
      <img class="ac-img" src="/api/itemimg/${slug}" onerror="this.style.display='none'" loading="lazy" style="margin-right:10px">
      <div class="set-part-info">
        <div class="set-part-name" style="color:var(--set)">${dbPart.name}</div>
        ${topStats?`<div class="set-part-stats">${topStats}</div>`:''}
        ${stashItem?`<div class="set-part-char">📍 ${stashItem.char} · <span class="status-btn ${stashItem.status}" style="display:inline;border:none;padding:0;font-size:11px">${STATUS_LABEL[stashItem.status]}</span></div>`:'<div class="set-part-stats" style="color:var(--seeking)">Ej i stash</div>'}
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        ${stashItem
          ?`<button class="btn" style="height:28px;font-size:10px" onclick="openEdit('${stashItem.id}');closeSetModal()">Redigera</button>`
          :`<button class="btn gold" style="height:28px;font-size:10px" onclick="openAddFromDB(d2db.find(d=>d.name==='${dbPart.name.replace(/'/g,"\'")}'));closeSetModal()">+ Lägg till</button>`
        }
      </div>
    </div>`;
  });

  document.getElementById('set-modal-body').innerHTML=html;
  document.getElementById('set-modal').classList.add('open');
}

function closeSetModal(){
  document.getElementById('set-modal').classList.remove('open');
}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);
}

document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.getElementById('set-modal').addEventListener('click',e=>{if(e.target===document.getElementById('set-modal'))closeSetModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeSetModal();closeAC();}});

loadAll();
</script>
</body>
</html>
